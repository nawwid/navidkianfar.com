<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#060807" />
    <title>Navid Kianfar</title>
    <meta name="description" content="Navid Kianfar — Software Engineer." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060807;
        --ink: #ddebe3;
        --muted: #5c6b62;
        --green: #4ecf8e;
        --name-size: clamp(1.75rem, 8vw, 3.5rem);
        --meta-size: clamp(0.65rem, 2vw, 0.75rem);
        --link-size: clamp(0.65rem, 2vw, 0.72rem);
        --pad-x: clamp(1.25rem, 5vw, 2.5rem);
        --pad-y: clamp(1.5rem, 6vh, 3rem);
        --max-w: 36rem;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, rgba(78, 207, 142, 0.04) 0%, transparent 70%),
          var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      main {
        width: min(100%, var(--max-w));
        text-align: center;
        padding:
          calc(var(--pad-y) + env(safe-area-inset-top, 0px))
          calc(var(--pad-x) + env(safe-area-inset-right, 0px))
          calc(var(--pad-y) + env(safe-area-inset-bottom, 0px))
          calc(var(--pad-x) + env(safe-area-inset-left, 0px));
        position: relative;
        z-index: 1;
        pointer-events: none;
      }

      .role {
        font-size: var(--meta-size);
        font-weight: 400;
        color: var(--muted);
        margin-bottom: clamp(0.85rem, 3vh, 1.25rem);
        min-height: 1.4em;
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
        transition: filter 0.35s ease;
      }

      .role.is-blurred {
        opacity: 1;
        filter: blur(7px);
        transform: translateY(0);
      }

      .role__cursor {
        display: inline-block;
        color: var(--green);
        opacity: 0;
        margin-left: 0.05em;
        animation: blink 0.9s step-end infinite;
      }

      .role.is-typing .role__cursor {
        opacity: 0.75;
      }

      .role::before {
        content: "// ";
        color: var(--green);
        opacity: 0.7;
      }

      h1 {
        font-size: var(--name-size);
        font-weight: 500;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.05em;
      }

      .word {
        display: inline-flex;
        overflow: hidden;
      }

      .char {
        display: inline-block;
        opacity: 0;
        animation: in 0.5s ease calc(0.2s + var(--i) * 0.05s) forwards;
      }

      .word--b .char {
        animation-delay: calc(0.55s + var(--i) * 0.05s);
      }

      .links {
        margin-top: clamp(1.25rem, 4vh, 1.85rem);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem 1.1rem;
        opacity: 0;
        animation: in 0.6s ease 1.2s forwards;
      }

      .links a {
        font-size: var(--link-size);
        font-weight: 400;
        color: var(--muted);
        text-decoration: none;
        padding: 0.65rem 0.35rem;
        min-height: 2.75rem;
        display: inline-flex;
        align-items: center;
        transition: color 0.2s ease;
        pointer-events: auto;
      }

      @media (hover: hover) and (pointer: fine) {
        .links a:hover {
          color: var(--green);
        }
      }

      .links a:active {
        color: var(--green);
      }

      .links a:focus-visible {
        outline: 1px solid var(--green);
        outline-offset: 4px;
      }

      .links .sep {
        color: var(--muted);
        font-size: 0.55rem;
        opacity: 0.4;
      }

      .noscript-fallback {
        font-size: var(--name-size);
        font-weight: 500;
      }

      .secrets {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      .spot {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: 4.5rem;
        height: 4.5rem;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: crosshair;
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
      }

      .spot.is-live {
        pointer-events: auto;
        animation: spot-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .spot__hint {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 0.68rem;
        line-height: 1;
        color: var(--green);
        opacity: 0;
        transition: opacity 0.2s ease;
        text-shadow: 0 0 12px rgba(78, 207, 142, 0.35);
      }

      .spot.is-live .spot__hint {
        opacity: 0.2;
        animation: spot-pulse 2.4s ease-in-out infinite;
      }

      .spot__data {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: clamp(0.58rem, 1.6vw, 0.68rem);
        font-weight: 400;
        line-height: 1.4;
        color: var(--green);
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        text-shadow: 0 0 24px rgba(78, 207, 142, 0.45);
        z-index: 1;
      }

      .spot__data::before {
        content: "// ";
        opacity: 0.65;
      }

      .spot.is-live:hover .spot__hint,
      .spot.is-live:focus-visible .spot__hint,
      .spot.is-live.is-open .spot__hint {
        opacity: 0.5;
      }

      .spot.is-live:hover .spot__data,
      .spot.is-live:focus-visible .spot__data,
      .spot.is-live.is-open .spot__data {
        opacity: 1;
        transform: translate(-50%, calc(-50% - 0.2rem));
      }

      @media (hover: none), (pointer: coarse) {
        .spot.is-live {
          cursor: pointer;
        }
      }

      .spot:focus-visible {
        outline: 1px solid rgba(78, 207, 142, 0.35);
        outline-offset: 2px;
      }

      @keyframes spot-in {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.2);
        }
        70% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.08);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      @keyframes spot-pulse {
        0%,
        100% {
          opacity: 0.12;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.25);
        }
      }

      @keyframes in {
        from {
          opacity: 0;
          transform: translateY(0.35rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 0.75;
        }
        50% {
          opacity: 0;
        }
      }

      @media (min-width: 768px) {
        :root {
          --max-w: 40rem;
        }
      }

      @media (max-height: 500px) and (orientation: landscape) {
        :root {
          --name-size: clamp(1.4rem, 8vh, 2rem);
          --pad-y: 0.75rem;
        }

        .role {
          margin-bottom: 0.5rem;
        }

        .links {
          margin-top: 0.75rem;
        }

        .links a {
          min-height: 2.25rem;
          padding-block: 0.35rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }

        .char,
        .links,
        .role {
          opacity: 1;
          transform: none;
          filter: none;
        }

        .role.is-blurred {
          opacity: 1;
          filter: none;
          transform: none;
        }

        .secrets {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="role" aria-label="software engineer" aria-live="polite">
        <span class="role__text">software engineer</span><span class="role__cursor" aria-hidden="true">▌</span>
      </p>

      <h1>
        <span class="word word--a" data-word="Navid"></span>
        <span class="word word--b" data-word="Kianfar"></span>
      </h1>
      <noscript>
        <p class="noscript-fallback">Navid Kianfar</p>
      </noscript>

      <nav class="links" aria-label="Get in touch">
        <a href="mailto:hello@navidkianfar.com">email</a>
        <span class="sep" aria-hidden="true">/</span>
        <a href="https://github.com/nawwid" rel="noopener noreferrer">github</a>
        <span class="sep" aria-hidden="true">/</span>
        <a href="https://www.linkedin.com/in/navidkianfar/" rel="noopener noreferrer">linkedin</a>
      </nav>
    </main>

    <div class="secrets" aria-hidden="true">
      <button class="spot" type="button" aria-label="31 years old">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">age: 0x1F</span>
      </button>
      <button class="spot" type="button" aria-label="Master degree in software engineering">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">edu: MEng · software engineering</span>
      </button>
      <button class="spot" type="button" aria-label="Technical team lead at ScalesOps">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">role: tech lead @ scalesops</span>
      </button>
      <button class="spot" type="button" aria-label="Based in London">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">based: london, uk</span>
      </button>
      <button class="spot" type="button" aria-label="16 plus years of experience">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">exp: 16y+ since '09</span>
      </button>
      <button class="spot" type="button" aria-label="DevOps, backend, database">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">devops · backend · database</span>
      </button>
      <button class="spot" type="button" aria-label="Kotlin, Java, JavaScript">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">code: kotlin · java · js</span>
      </button>
      <button class="spot" type="button" aria-label="Flutter, Android, iOS mobile development">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">mobile: flutter · android · ios</span>
      </button>
      <button class="spot" type="button" aria-label="English and Persian">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">speak: english · persian</span>
      </button>
      <button class="spot" type="button" aria-label="Shahid Beheshti University">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">uni: shahid beheshti</span>
      </button>
      <button class="spot" type="button" aria-label="Web, mobile, and cloud">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">ship: web · mobile · cloud</span>
      </button>
      <button class="spot" type="button" aria-label="Team leadership and delivery">
        <span class="spot__hint" aria-hidden="true">·</span>
        <span class="spot__data">lead: teams · delivery</span>
      </button>
    </div>

    <script>
      document.querySelectorAll(".word").forEach((word) => {
        const frag = document.createDocumentFragment();
        [...word.dataset.word].forEach((char, i) => {
          const span = document.createElement("span");
          span.className = "char";
          span.style.setProperty("--i", i);
          span.textContent = char;
          frag.appendChild(span);
        });
        word.appendChild(frag);
      });

      function placeSpot(spot, placed) {
        const main = document.querySelector("main");
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const margin = Math.max(48, Math.min(vw, vh) * 0.08);
        const minGap = Math.max(56, Math.min(vw, vh) * 0.09);
        const mainBox = main.getBoundingClientRect();
        const pad = 32;
        const avoid = {
          left: mainBox.left - pad,
          right: mainBox.right + pad,
          top: mainBox.top - pad,
          bottom: mainBox.bottom + pad,
        };

        const hitsCenter = (x, y) =>
          x > avoid.left && x < avoid.right && y > avoid.top && y < avoid.bottom;
        const tooClose = (x, y) =>
          placed.some((p) => Math.hypot(p.x - x, p.y - y) < minGap);

        let x = 0;
        let y = 0;
        for (let i = 0; i < 80; i++) {
          x = margin + Math.random() * (vw - margin * 2);
          y = margin + Math.random() * (vh - margin * 2);
          if (!hitsCenter(x, y) && !tooClose(x, y)) break;
        }

        const point = { x, y };
        placed.push(point);
        spot.style.setProperty("--x", `${(x / vw) * 100}%`);
        spot.style.setProperty("--y", `${(y / vh) * 100}%`);
        return point;
      }

      function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function revealSecrets() {
        const spots = shuffle([...document.querySelectorAll(".spot")]);
        const placed = [];
        let i = 0;

        const revealNext = () => {
          if (i >= spots.length) return;
          placeSpot(spots[i], placed);
          spots[i].classList.add("is-live");
          i += 1;
          setTimeout(revealNext, 750 + Math.random() * 550);
        };

        setTimeout(revealNext, 1800);
      }

      if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
        revealSecrets();
      }

      function setupSpotTaps() {
        const touchLike = matchMedia("(hover: none), (pointer: coarse)").matches;
        if (!touchLike) return;

        document.querySelectorAll(".spot").forEach((spot) => {
          spot.addEventListener("click", (e) => {
            if (!spot.classList.contains("is-live")) return;
            e.stopPropagation();
            const wasOpen = spot.classList.contains("is-open");
            document.querySelectorAll(".spot.is-open").forEach((s) => s.classList.remove("is-open"));
            if (!wasOpen) spot.classList.add("is-open");
          });
        });

        document.addEventListener("click", () => {
          document.querySelectorAll(".spot.is-open").forEach((s) => s.classList.remove("is-open"));
        });
      }

      setupSpotTaps();

      function setupRoleCycle() {
        if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;

        const role = document.querySelector(".role");
        const text = role?.querySelector(".role__text");
        if (!role || !text) return;

        const roles = [
          "software engineer",
          "devops engineer",
          "backend developer",
          "mobile developer",
          "tech lead",
          "flutter developer",
          "android developer",
          "node.js developer",
        ];

        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        let current = text.textContent.trim();
        let busy = false;

        const pickRole = () => {
          let next = current;
          while (next === current) {
            next = roles[Math.floor(Math.random() * roles.length)];
          }
          return next;
        };

        const erase = async () => {
          role.classList.add("is-typing", "is-blurred");
          for (let i = current.length; i >= 0; i--) {
            text.textContent = current.slice(0, i);
            await wait(28 + Math.random() * 22);
          }
        };

        const type = async (next) => {
          for (let i = 0; i <= next.length; i++) {
            text.textContent = next.slice(0, i);
            if (i / next.length > 0.45) role.classList.remove("is-blurred");
            await wait(38 + Math.random() * 28);
          }
          role.classList.remove("is-blurred", "is-typing");
        };

        const swap = async () => {
          if (busy) return;
          busy = true;
          await erase();
          current = pickRole();
          role.setAttribute("aria-label", current);
          await type(current);
          busy = false;
          setTimeout(swap, 5500 + Math.random() * 7500);
        };

        setTimeout(swap, 4000 + Math.random() * 4000);
      }

      setupRoleCycle();
    </script>
  </body>
</html>
