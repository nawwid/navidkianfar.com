<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#060807" />
    <title>Navid Kianfar</title>
    <meta name="description" content="Navid Kianfar — Software Engineer." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060807;
        --ink: #ddebe3;
        --muted: #5c6b62;
        --green: #4ecf8e;
        --name-size: clamp(1.75rem, 8vw, 3.5rem);
        --meta-size: clamp(0.65rem, 2vw, 0.75rem);
        --link-size: clamp(0.65rem, 2vw, 0.72rem);
        --pad-x: clamp(1.25rem, 5vw, 2.5rem);
        --pad-y: clamp(1.5rem, 6vh, 3rem);
        --max-w: 36rem;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, rgba(78, 207, 142, 0.04) 0%, transparent 70%),
          var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      main {
        width: min(100%, var(--max-w));
        text-align: center;
        padding:
          calc(var(--pad-y) + env(safe-area-inset-top, 0px))
          calc(var(--pad-x) + env(safe-area-inset-right, 0px))
          calc(var(--pad-y) + env(safe-area-inset-bottom, 0px))
          calc(var(--pad-x) + env(safe-area-inset-left, 0px));
      }

      .role {
        font-size: var(--meta-size);
        font-weight: 400;
        color: var(--muted);
        margin-bottom: clamp(0.85rem, 3vh, 1.25rem);
      }

      .role::before {
        content: "// ";
        color: var(--green);
        opacity: 0.7;
      }

      h1 {
        font-size: var(--name-size);
        font-weight: 500;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.05em;
      }

      .word {
        display: inline-flex;
        overflow: hidden;
      }

      .char {
        display: inline-block;
        opacity: 0;
        animation: in 0.5s ease calc(0.2s + var(--i) * 0.05s) forwards;
      }

      .word--b .char {
        animation-delay: calc(0.55s + var(--i) * 0.05s);
      }

      .links {
        margin-top: clamp(1.25rem, 4vh, 1.85rem);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem 1.1rem;
        opacity: 0;
        animation: in 0.6s ease 1.2s forwards;
      }

      .links a {
        font-size: var(--link-size);
        font-weight: 400;
        color: var(--muted);
        text-decoration: none;
        padding: 0.65rem 0.35rem;
        min-height: 2.75rem;
        display: inline-flex;
        align-items: center;
        transition: color 0.2s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .links a:hover {
          color: var(--green);
        }
      }

      .links a:active {
        color: var(--green);
      }

      .links a:focus-visible {
        outline: 1px solid var(--green);
        outline-offset: 4px;
      }

      .links .sep {
        color: var(--muted);
        font-size: 0.55rem;
        opacity: 0.4;
      }

      .noscript-fallback {
        font-size: var(--name-size);
        font-weight: 500;
      }

      @keyframes in {
        from {
          opacity: 0;
          transform: translateY(0.35rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (min-width: 768px) {
        :root {
          --max-w: 40rem;
        }
      }

      @media (max-height: 500px) and (orientation: landscape) {
        :root {
          --name-size: clamp(1.4rem, 8vh, 2rem);
          --pad-y: 0.75rem;
        }

        .role {
          margin-bottom: 0.5rem;
        }

        .links {
          margin-top: 0.75rem;
        }

        .links a {
          min-height: 2.25rem;
          padding-block: 0.35rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }

        .char,
        .links {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="role">software engineer</p>

      <h1>
        <span class="word word--a" data-word="Navid"></span>
        <span class="word word--b" data-word="Kianfar"></span>
      </h1>
      <noscript>
        <p class="noscript-fallback">Navid Kianfar</p>
      </noscript>

      <nav class="links" aria-label="Get in touch">
        <a href="mailto:hello@navidkianfar.com">email</a>
        <span class="sep" aria-hidden="true">·</span>
        <a href="https://github.com/nawwid" rel="noopener noreferrer">github</a>
      </nav>
    </main>

    <script>
      document.querySelectorAll(".word").forEach((word) => {
        const frag = document.createDocumentFragment();
        [...word.dataset.word].forEach((char, i) => {
          const span = document.createElement("span");
          span.className = "char";
          span.style.setProperty("--i", i);
          span.textContent = char;
          frag.appendChild(span);
        });
        word.appendChild(frag);
      });
    </script>
  </body>
</html>
