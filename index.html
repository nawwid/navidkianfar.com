<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navid Kianfar</title>
    <meta name="description" content="Navid Kianfar — Software Engineer." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=Syne:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @property --hue {
        syntax: "<angle>";
        inherits: false;
        initial-value: 0deg;
      }

      :root {
        --bg: #040506;
        --ink: #f2f4f6;
        --muted: #7a828c;
        --accent: #9fd0dd;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: "IBM Plex Sans", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #fx {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      main {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        transform: translate(
          calc(var(--mx, 0) * 8px),
          calc(var(--my, 0) * 8px)
        );
        transition: transform 0.15s ease-out;
      }

      .role {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.1rem;
        clip-path: inset(0 100% 0 0);
        animation: role-reveal 1.4s cubic-bezier(0.77, 0, 0.18, 1) 0.2s forwards;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: clamp(2.6rem, 10vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.08em;
      }

      .word {
        display: inline-flex;
        overflow: hidden;
      }

      .word--b {
        margin-left: 0.35em;
      }

      .char {
        display: inline-block;
        opacity: 0;
        transform: translate3d(0, 110%, 0) rotateZ(8deg);
        background: linear-gradient(
          var(--hue),
          #f2f4f6 0%,
          #9fd0dd 30%,
          #c4a8e8 55%,
          #7eb8ff 75%,
          #f2f4f6 100%
        );
        background-size: 220% 220%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation:
          char-rise 0.75s cubic-bezier(0.22, 1, 0.36, 1) calc(0.35s + var(--i) * 0.055s) forwards,
          char-wave 4.5s ease-in-out calc(1.6s + var(--i) * 0.12s) infinite,
          hue-spin 10s linear 1.5s infinite;
      }

      .word--b .char {
        animation-delay:
          calc(0.75s + var(--i) * 0.055s),
          calc(2s + var(--i) * 0.12s),
          1.5s;
      }

      .char.space {
        width: 0.3em;
      }

      .echo {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.08em;
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: clamp(2.6rem, 10vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
        color: rgba(159, 208, 221, 0.08);
        pointer-events: none;
        mix-blend-mode: screen;
        animation: echo-pulse 5s ease-in-out infinite;
      }

      .name-wrap {
        position: relative;
        --hue: 0deg;
      }

      .links {
        margin-top: 1.85rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.65rem;
        opacity: 0;
        animation: fade-up 0.8s ease 2.1s forwards;
      }

      .links a {
        position: relative;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .links a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 1px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .links a:hover {
        color: var(--accent);
      }

      .links a:hover::after {
        transform: scaleX(1);
        transform-origin: left;
      }

      .links a:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: 4px;
      }

      .links .sep {
        color: rgba(122, 130, 140, 0.45);
        font-size: 0.55rem;
      }

      @keyframes role-reveal {
        to {
          clip-path: inset(0 0 0 0);
        }
      }

      @keyframes char-rise {
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotateZ(0);
        }
      }

      @keyframes char-wave {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }
        50% {
          transform: translate3d(0, -5px, 0);
        }
      }

      @keyframes hue-spin {
        to {
          --hue: 360deg;
        }
      }

      @keyframes echo-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.02);
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(0.5rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }

        main {
          transform: none;
        }

        .role {
          clip-path: none;
        }

        .char {
          opacity: 1;
          transform: none;
          color: var(--ink);
          background: none;
        }

        .links {
          opacity: 1;
        }

        .echo {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="fx" aria-hidden="true"></canvas>

    <main>
      <p class="role">Software Engineer</p>

      <div class="name-wrap">
        <div class="echo" aria-hidden="true">
          <span>Navid</span>
          <span>Kianfar</span>
        </div>
        <h1 aria-label="Navid Kianfar">
          <span class="word word--a" data-word="Navid"></span>
          <span class="word word--b" data-word="Kianfar"></span>
        </h1>
      </div>

      <nav class="links" aria-label="Get in touch">
        <a href="mailto:hello@navidkianfar.com">Email</a>
        <span class="sep" aria-hidden="true">·</span>
        <a href="https://github.com/nawwid" rel="noopener noreferrer">GitHub</a>
      </nav>
    </main>

    <script>
      const words = document.querySelectorAll(".word");

      words.forEach((word) => {
        [...word.dataset.word].forEach((char, i) => {
          const span = document.createElement("span");
          span.className = "char";
          span.style.setProperty("--i", i);
          span.textContent = char;
          word.appendChild(span);
        });
      });

      const canvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d", { alpha: true });
      let w, h, dpr, t = 0, running = true;
      let mx = 0, my = 0;

      const blobs = [
        { x: 0.3, y: 0.35, r: 0.35, hue: 195, speed: 0.4 },
        { x: 0.7, y: 0.65, r: 0.28, hue: 270, speed: -0.3 },
        { x: 0.5, y: 0.5, r: 0.22, hue: 210, speed: 0.25 },
      ];

      const stars = Array.from({ length: 48 }, () => ({
        x: Math.random(),
        y: Math.random(),
        z: Math.random() * 0.6 + 0.4,
        tw: Math.random() * Math.PI * 2,
      }));

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        w = canvas.width = innerWidth * dpr;
        h = canvas.height = innerHeight * dpr;
        canvas.style.width = innerWidth + "px";
        canvas.style.height = innerHeight + "px";
      }

      function drawBlob(b, time) {
        const px = (b.x + Math.sin(time * b.speed + b.hue) * 0.06 + mx * 0.02) * w;
        const py = (b.y + Math.cos(time * b.speed * 1.2) * 0.05 + my * 0.02) * h;
        const pr = b.r * Math.min(w, h);
        const g = ctx.createRadialGradient(px, py, 0, px, py, pr);
        g.addColorStop(0, `hsla(${b.hue}, 55%, 65%, 0.14)`);
        g.addColorStop(1, "transparent");
        ctx.fillStyle = g;
        ctx.fillRect(px - pr, py - pr, pr * 2, pr * 2);
      }

      function drawRing(time) {
        const cx = w * 0.5 + mx * 12 * dpr;
        const cy = h * 0.48 + my * 12 * dpr;
        const r = Math.min(w, h) * 0.22;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(time * 0.15);
        ctx.strokeStyle = "rgba(159, 208, 221, 0.12)";
        ctx.lineWidth = 1 * dpr;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(196, 168, 232, 0.35)";
        ctx.beginPath();
        ctx.arc(0, 0, r, time, time + Math.PI * 0.6);
        ctx.stroke();
        ctx.restore();
      }

      function drawStars(time) {
        stars.forEach((s) => {
          const flicker = 0.35 + Math.sin(time * 2 + s.tw) * 0.35;
          const px = s.x * w;
          const py = (s.y + ((time * 0.02 * s.z) % 1)) * h - h * 0.1;
          ctx.fillStyle = `rgba(255,255,255,${flicker * s.z * 0.5})`;
          ctx.fillRect(px, py, 1.5 * dpr, 1.5 * dpr);
        });
      }

      function frame(now) {
        if (!running) return;
        t = now * 0.001;
        ctx.clearRect(0, 0, w, h);
        blobs.forEach((b) => drawBlob(b, t));
        drawRing(t);
        drawStars(t);
        requestAnimationFrame(frame);
      }

      resize();
      requestAnimationFrame(frame);
      addEventListener("resize", resize);

      addEventListener("pointermove", (e) => {
        mx = (e.clientX / innerWidth - 0.5) * 2;
        my = (e.clientY / innerHeight - 0.5) * 2;
        document.body.style.setProperty("--mx", mx.toFixed(3));
        document.body.style.setProperty("--my", my.toFixed(3));
      });

      document.addEventListener("visibilitychange", () => {
        running = !document.hidden;
        if (running) requestAnimationFrame(frame);
      });
    </script>
  </body>
</html>
